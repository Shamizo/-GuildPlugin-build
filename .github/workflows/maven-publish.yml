name: Build Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 更新到 v4 避免 Node.js 20 废弃警告
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'   # 'adopt' 已过时，推荐 'temurin'

      - name: Build with Maven
        run: mvn -B package

      # 修正路径：多模块项目产物在 guild-plugin/target/ 下
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Plugin
          path: guild-plugin/target/*.jar

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2   # 升级到 v2 更好
        with:
          files: guild-plugin/target/*.jar
